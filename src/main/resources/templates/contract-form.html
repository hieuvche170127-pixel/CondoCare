<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soạn thảo Hợp đồng - Quản lý Chung cư</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .form-section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0d6efd;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="bg-light">
<div id="loading" class="loading"><div class="spinner"></div></div>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
            <div class="position-sticky pt-3">
                <div class="text-center mb-4">
                    <h4 class="text-white"><i class="fas fa-building"></i> Dashboard</h4>
                    <small class="text-white-50" id="userFullName"></small>
                </div>

                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-tachometer-alt"></i> Tổng quan</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/buildings"><i class="fas fa-building"></i> Tòa nhà</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/apartments"><i class="fas fa-home"></i> Căn hộ</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/residents"><i class="fas fa-users"></i> Cư dân</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/access-cards"><i class="fas fa-id-card"></i> Thẻ ra vào</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/dashboard/vehicles"><i class="fas fa-motorcycle"></i> Phương tiện</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/contracts"><i class="fas fa-file-signature"></i> Hợp đồng</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/fees"><i class="fas fa-file-invoice-dollar"></i> Phí dịch vụ</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/invoices"><i class="fas fa-receipt"></i> Hóa đơn</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/reports"><i class="fas fa-chart-bar"></i> Báo cáo</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/settings"><i class="fas fa-cog"></i> Cài đặt</a></li>
                    <li class="nav-item mt-4"><a class="nav-link" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a></li>
                </ul>
            </div>
        </nav>

        <!-- Nội dung chính -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                <h1 class="h2 text-primary" th:text="${isEdit ? 'Cập nhật Hợp đồng' : 'Soạn Hợp đồng mới'}"></h1>
                <a th:href="@{/dashboard/contracts}" class="btn btn-sm btn-outline-secondary">
                    <i class="fas fa-arrow-left"></i> Quay lại
                </a>
            </div>

            <div class="card shadow border-0 col-lg-10 mx-auto mb-5">
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/dashboard/contracts/save}" th:object="${contract}" method="POST" id="contractForm">
                        <input type="hidden" name="isEdit" th:value="${isEdit}">
                        <input type="hidden" th:if="${isEdit}" th:field="*{status}">

                        <!-- PHẦN 1: CHỌN ĐỐI TƯỢNG -->
                        <div class="form-section-title"><i class="fas fa-user-tag me-2"></i>1. Thông tin Căn hộ & Cư dân</div>

                        <div class="row mb-4">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Bước 1: Chọn Tòa nhà <span class="text-danger">*</span></label>
                                <select id="buildingSelect" class="form-select form-select-lg" required th:disabled="${isEdit}">
                                    <option value="">-- Chọn Tòa nhà --</option>
                                    <option th:each="b : ${buildings}"
                                            th:value="${b.id}"
                                            th:text="${b.name}"
                                            th:selected="${contract.apartment != null && contract.apartment.building != null && contract.apartment.building.id == b.id}"></option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-bold">Bước 2: Chọn Căn hộ <span class="text-danger">*</span></label>
                                <select id="apartmentSelect" class="form-select form-select-lg" th:field="*{apartment.id}" required th:disabled="${isEdit}">
                                    <option value="">-- Trước tiên hãy chọn Tòa nhà --</option>
                                    <!-- Options sẽ được đổ vào bằng Javascript -->
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-bold">Bước 3: Chọn Cư dân (Bên B) <span class="text-danger">*</span></label>
                                <select class="form-select form-select-lg" th:field="*{resident.id}" required>
                                    <th:block th:fragment="apartmentOptions">
                                        <option value="" data-rent="0" data-sale="0">-- Chọn Căn hộ --</option>
                                        <option th:if="${aptList != null && #lists.isEmpty(aptList)}" value="" data-rent="0" data-sale="0">-- Tòa nhà không có căn hộ --</option>

                                        <option th:each="apt : ${aptList}"
                                                th:value="${apt.id}"
                                                th:text="${apt.number + ' (Tầng ' + apt.floor + ')'}"
                                                th:selected="${selectedAptId != null && apt.id == selectedAptId}"
                                                th:attr="data-rent=${apt.rentPrice != null ? apt.rentPrice : 0}, data-sale=${apt.salePrice != null ? apt.salePrice : 0}">
                                        </option>
                                    </th:block>
                                </select>
                            </div>
                        </div>

                        <!-- PHẦN 2: CHI TIẾT ĐIỀU KHOẢN -->
                        <div class="form-section-title"><i class="fas fa-file-invoice-dollar me-2"></i>2. Chi tiết điều khoản</div>

                        <div class="row mb-4">
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Mã Hợp đồng <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{id}" required th:readonly="${isEdit}" placeholder="Ví dụ: CON-001">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Loại giao dịch</label>
                                <select class="form-select" th:field="*{type}">
                                    <option value="RENT">Cho thuê căn hộ</option>
                                    <option value="SALE">Mua bán căn hộ</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Tổng giá trị (VNĐ)</label>
                                <input type="number" class="form-control" th:field="*{totalValue}" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Nhân viên phụ trách</label>
                                <select class="form-select" th:field="*{staff.id}" required>
                                    <option th:each="s : ${staffs}" th:value="${s.id}" th:text="${s.fullName}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Ngày bắt đầu hiệu lực</label>
                                <input type="date" class="form-control" th:field="*{startDate}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-muted">Ngày kết thúc (Dự kiến)</label>
                                <input type="date" class="form-control" th:field="*{endDate}">
                            </div>
                        </div>

                        <div class="text-end border-top pt-4">
                            <a th:href="@{/dashboard/contracts}" class="btn btn-light px-4 me-2">Hủy</a>
                            <button type="submit" class="btn btn-primary px-5 shadow-sm">
                                <i class="fas fa-save me-2"></i> Lưu Bản Nháp
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        const buildingSelect = document.getElementById('buildingSelect');
        const apartmentSelect = document.getElementById('apartmentSelect');
        const contractTypeSelect = document.getElementById('contractType');
        const totalValueInput = document.getElementById('totalValue');

        // ID căn hộ hiện tại nếu là form Sửa
        const currentAptId = /*[[${contract.apartment != null ? contract.apartment.id : null}]]*/ null;

        // 1. Hàm load Fragment Căn hộ qua AJAX
        async function fetchApartmentsFragment(buildingId, selectedId = '') {
            if (!buildingId) {
                apartmentSelect.innerHTML = '<option value="" data-rent="0" data-sale="0">-- Trước tiên hãy chọn Tòa nhà --</option>';
                totalValueInput.value = '';
                return;
            }

            apartmentSelect.innerHTML = '<option value="">Đang tải dữ liệu...</option>';

            try {
                // Gọi tới endpoint Fragment trong ApartmentController
                const url = `/dashboard/apartments/load-apartments?buildingId=${buildingId}&selectedId=${selectedId || ''}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Lỗi server');

                // Nhét HTML thẳng vào thẻ select
                apartmentSelect.innerHTML = await response.text();

                // Sau khi load xong, gọi hàm cập nhật giá tiền
                updateTotalValue();

            } catch (error) {
                console.error('Lỗi khi tải căn hộ:', error);
                apartmentSelect.innerHTML = '<option value="">Lỗi tải dữ liệu!</option>';
            }
        }

        // 2. Hàm tự động điền Giá tiền dựa vào data-attributes
        function updateTotalValue() {
            // Lấy option đang được chọn
            const selectedOption = apartmentSelect.options[apartmentSelect.selectedIndex];
            if (!selectedOption || !selectedOption.value) {
                totalValueInput.value = ''; // Xóa giá trị nếu không chọn căn hộ
                return;
            }

            const type = contractTypeSelect.value;
            const rentPrice = parseFloat(selectedOption.getAttribute('data-rent')) || 0;
            const salePrice = parseFloat(selectedOption.getAttribute('data-sale')) || 0;

            if (type === 'RENT' && rentPrice > 0) {
                totalValueInput.value = rentPrice;
            } else if (type === 'SALE' && salePrice > 0) {
                totalValueInput.value = salePrice;
            } else {
                totalValueInput.value = ''; // Nếu chưa setup giá, để trống cho người dùng tự nhập
            }
        }

        // --- GẮN SỰ KIỆN LẮNG NGHE ---

        // Khi đổi tòa nhà -> Load lại căn hộ
        buildingSelect.addEventListener('change', function() {
            fetchApartmentsFragment(this.value);
        });

        // Khi đổi căn hộ hoặc đổi loại hợp đồng -> Tính lại giá
        apartmentSelect.addEventListener('change', updateTotalValue);
        contractTypeSelect.addEventListener('change', updateTotalValue);

        // --- KHỞI TẠO BAN ĐẦU (Dùng cho form Sửa) ---
        if (buildingSelect.value) {
            fetchApartmentsFragment(buildingSelect.value, currentAptId);
        }
    });
</script>
</body>
</html>
