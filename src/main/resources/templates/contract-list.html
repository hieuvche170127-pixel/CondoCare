<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Hợp đồng - Quản lý Chung cư</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="loading" class="loading"><div class="spinner"></div></div>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar chuẩn mẫu -->
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
            <div class="position-sticky pt-3">
                <div class="text-center mb-4">
                    <h4 class="text-white"><i class="fas fa-building"></i> Dashboard</h4>
                    <small class="text-white-50" id="userFullName"></small>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-tachometer-alt"></i> Tổng quan</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/buildings"><i class="fas fa-building"></i> Tòa nhà</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/apartments"><i class="fas fa-home"></i> Căn hộ</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/residents"><i class="fas fa-users"></i> Cư dân</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/access-cards"><i class="fas fa-id-card"></i> Thẻ ra vào</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/dashboard/vehicles"><i class="fas fa-motorcycle"></i> Phương tiện</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/contracts"><i class="fas fa-file-signature"></i> Hợp đồng</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/fees"><i class="fas fa-file-invoice-dollar"></i> Phí dịch vụ</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/invoices"><i class="fas fa-receipt"></i> Hóa đơn</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/reports"><i class="fas fa-chart-bar"></i> Báo cáo</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/settings"><i class="fas fa-cog"></i> Cài đặt</a></li>
                    <li class="nav-item mt-4"><a class="nav-link" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a></li>
                </ul>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pb-5">
            <div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Quản lý Hợp đồng</h1>
                <a th:href="@{/dashboard/contracts/add}" class="btn btn-primary shadow-sm">
                    <i class="fas fa-plus"></i> Tạo Hợp đồng Nháp
                </a>
            </div>

            <!-- Thông báo -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm">
                <i class="fas fa-check-circle me-1"></i> <strong th:text="${successMessage}"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm">
                <i class="fas fa-exclamation-triangle me-1"></i> <strong th:text="${errorMessage}"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow border-0">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Mã HĐ</th>
                            <th>Căn hộ</th>
                            <th>Cư dân</th>
                            <th>Loại</th>
                            <th>Giá trị</th>
                            <th>Trạng thái</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(contracts)}">
                            <td colspan="7" class="text-center text-muted py-5">Không có hợp đồng nào phù hợp.</td>
                        </tr>
                        <tr th:each="c : ${contracts}">
                            <td class="fw-bold text-primary" th:text="${c.id}"></td>
                            <td th:text="${c.apartment?.number != null ? c.apartment.number : 'Trống'}"></td>
                            <td th:text="${c.resident?.fullName != null ? c.resident.fullName : 'Trống'}"></td>
                            <td><span class="badge bg-secondary opacity-75" th:text="${c.type?.name() == 'RENT' ? 'Cho Thuê' : 'Mua Bán'}"></span></td>
                            <td class="text-danger fw-bold" th:text="${c.totalValue != null ? #numbers.formatDecimal(c.totalValue, 0, 'COMMA', 0, 'POINT') + ' VNĐ' : '0 VNĐ'}"></td>
                            <td>
                                    <span class="badge"
                                          th:classappend="${c.status?.name() == 'DRAFT' ? 'bg-secondary' :
                                                        (c.status?.name() == 'PENDING' ? 'bg-warning text-dark' :
                                                        (c.status?.name() == 'ACTIVE' ? 'bg-success' :
                                                        (c.status?.name() == 'REJECT' ? 'bg-danger' : 'bg-dark')))}"
                                          th:text="${c.status?.name() == 'DRAFT' ? 'Bản nháp' :
                                                   (c.status?.name() == 'PENDING' ? 'Chờ duyệt' :
                                                   (c.status?.name() == 'ACTIVE' ? 'Đang hiệu lực' :
                                                   (c.status?.name() == 'REJECT' ? 'Từ chối' :
                                                   (c.status?.name() == 'TERMINATED' ? 'Đã thanh lý' : 'Hết hạn'))))}"></span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/dashboard/contracts/view/{id}(id=${c.id})}" class="btn btn-outline-info" title="Xem"><i class="fas fa-eye"></i></a>
                                    <a th:if="${c.status?.name() == 'DRAFT'}" th:href="@{/dashboard/contracts/edit/{id}(id=${c.id})}" class="btn btn-outline-warning" title="Sửa"><i class="fas fa-edit"></i></a>
                                    <a th:if="${c.status?.name() == 'DRAFT'}" th:href="@{/dashboard/contracts/send/{id}(id=${c.id})}" class="btn btn-outline-primary" title="Gửi cư dân" onclick="return confirm('Gửi hợp đồng cho cư dân xác nhận?');"><i class="fas fa-paper-plane"></i></a>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>setTimeout(function() { document.querySelectorAll('.alert').forEach(a => new bootstrap.Alert(a).close()); }, 3000);</script>
</body>
</html>
