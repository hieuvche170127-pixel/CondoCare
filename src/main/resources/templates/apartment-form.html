<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm/Sửa Căn hộ - Apartment Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="loading" class="loading"><div class="spinner"></div></div>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
            <div class="position-sticky pt-3">
                <div class="text-center mb-4">
                    <h4 class="text-white"><i class="fas fa-building"></i> Dashboard</h4>
                    <small class="text-white-50" id="userFullName"></small>
                </div>

                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-tachometer-alt"></i> Tổng quan</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/buildings"><i class="fas fa-building"></i> Tòa nhà</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/apartments"><i class="fas fa-home"></i> Căn hộ</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/residents"><i class="fas fa-users"></i> Cư dân</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/access-cards"><i class="fas fa-id-card"></i> Thẻ ra vào</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/dashboard/vehicles"><i class="fas fa-motorcycle"></i> Phương tiện</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/contracts"><i class="fas fa-file-signature"></i> Hợp đồng</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/fees"><i class="fas fa-file-invoice-dollar"></i> Phí dịch vụ</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/invoices"><i class="fas fa-receipt"></i> Hóa đơn</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/reports"><i class="fas fa-chart-bar"></i> Báo cáo</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/settings"><i class="fas fa-cog"></i> Cài đặt</a></li>
                    <li class="nav-item mt-4"><a class="nav-link" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a></li>
                </ul>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2" th:text="${isEdit ? 'Chỉnh sửa Căn hộ' : 'Thêm mới Căn hộ'}">Thêm Căn hộ</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <a th:href="@{/dashboard/apartments}" class="btn btn-sm btn-outline-secondary">
                        <i class="fas fa-arrow-left"></i> Quay lại
                    </a>
                </div>
            </div>

            <div class="card shadow col-lg-8 mx-auto mb-5">
                <div class="card-header bg-white">
                    <h6 class="m-0 font-weight-bold">Thông tin Căn hộ</h6>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/dashboard/apartments/save}" th:object="${apartment}" method="POST">

                        <input type="hidden" th:if="${isEdit}" th:field="*{id}">
                        <input type="hidden" name="isEdit" th:value="${isEdit}">

                        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-triangle me-1"></i> <strong th:text="${errorMessage}"></strong>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Thuộc Tòa nhà <span class="text-danger">*</span></label>
                                <select class="form-select" th:field="*{building.id}" required th:style="${isEdit ? 'pointer-events: none; background-color: #e9ecef;' : ''}">
                                    <option value="">-- Chọn Tòa nhà --</option>
                                    <option th:each="b : ${buildings}" th:value="${b.id}" th:text="${b.name}"></option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Số Tầng <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" th:field="*{floor}" required min="1" th:readonly="${isEdit}">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold">Số Phòng <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" th:field="*{number}" required placeholder="VD: A101" th:readonly="${isEdit}">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Diện tích (m²) <span class="text-danger">*</span></label>
                                <input type="number" step="0.1" class="form-control" th:field="*{area}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Giá bán (VNĐ)</label>
                                <input type="number" class="form-control" th:field="*{salePrice}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Giá thuê (VNĐ/Tháng)</label>
                                <input type="number" class="form-control" th:field="*{rentPrice}">
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Trạng thái ở</label>
                                <select class="form-select" th:field="*{status}">
                                    <option value="EMPTY">Trống</option>
                                    <option value="OCCUPIED">Đang có người ở</option>
                                    <option value="MAINTENANCE">Đang bảo trì</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Hình thức sở hữu</label>
                                <select class="form-select" th:field="*{rentalStatus}">
                                    <option value="AVAILABLE">Có thể cho thuê/bán</option>
                                    <option value="RENTED">Đã cho thuê</option>
                                    <option value="OWNER">Đã bán (Chủ ở)</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-12">
                                <label class="form-label fw-bold">Hình ảnh Căn hộ (Định dạng ảnh, Tối đa 10MB)</label>
                                <input type="file" class="form-control" name="imageFile" accept="image/png, image/jpeg, image/jpg, image/webp">

                                <div th:if="${isEdit and apartment.images != null and !apartment.images.isEmpty()}" class="mt-3 bg-white p-2 border rounded d-inline-block">
                                    <p class="small text-muted mb-2 fw-bold"><i class="fas fa-image me-1"></i> Ảnh đang sử dụng:</p>
                                    <img th:src="${apartment.images}" alt="Ảnh căn hộ" class="img-preview shadow-sm">
                                </div>
                            </div>
                        </div>



                        <div class="mb-4">
                            <label class="form-label fw-bold">Mô tả thêm</label>
                            <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Ghi chú về căn hộ..."></textarea>
                        </div>

                        <hr>
                        <div class="text-end mt-3">
                            <a th:href="@{/dashboard/apartments}" class="btn btn-light me-2">Hủy bỏ</a>
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Lưu thông tin</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/common.js"></script>
</body>
</html>
