<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hợp đồng của tôi - Cư dân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#"><i class="fas fa-building"></i> Resident Portal</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="/resident-dashboard/contracts"><i class="fas fa-file-contract"></i> Hợp đồng</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="/logout"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-3">
    <h3 class="mb-4 text-primary fw-bold"><i class="fas fa-file-signature"></i> Quản lý Hợp đồng của bạn</h3>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"><strong th:text="${successMessage}"></strong><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show"><strong th:text="${errorMessage}"></strong><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>

    <div class="row">
        <div class="col-md-12">
            <div th:if="${#lists.isEmpty(contracts)}" class="text-center py-5 bg-white rounded shadow-sm">
                <h5 class="text-muted">Bạn chưa có hợp đồng nào.</h5>
            </div>

            <div class="card shadow-sm mb-4 border-0" th:each="c : ${contracts}" th:style="${c.status?.name() == 'PENDING' ? 'border-left: 5px solid #ffc107 !important;' : 'border-left: 5px solid #0d6efd !important;'}">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="m-0 fw-bold"><i class="fas fa-file-alt text-primary me-2"></i>Mã HĐ: <span th:text="${c.id}"></span></h5>
                    <span class="badge fs-6 px-3 py-2"
                          th:classappend="${c.status?.name() == 'PENDING' ? 'bg-warning text-dark' : (c.status?.name() == 'ACTIVE' ? 'bg-success' : 'bg-secondary')}"
                          th:text="${c.status?.name() == 'PENDING' ? 'CẦN XÁC NHẬN' : (c.status != null ? c.status.name() : 'N/A')}"></span>
                </div>

                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <small class="text-muted d-block">Căn hộ</small>
                            <strong class="text-primary" th:text="${c.apartment?.id != null ? c.apartment.id : 'N/A'}"></strong>
                        </div>
                        <div class="col-md-3">
                            <small class="text-muted d-block">Giá trị</small>
                            <strong class="text-danger fs-5" th:text="${c.totalValue != null ? #numbers.formatDecimal(c.totalValue, 0, 'COMMA', 0, 'POINT') + ' VNĐ' : 'N/A'}"></strong>
                        </div>
                        <div class="col-md-6 text-end">
                            <a th:href="@{/resident-dashboard/contracts/view/{id}(id=${c.id})}" class="btn btn-outline-info">Xem Chi Tiết Đầy Đủ</a>
                        </div>
                    </div>

                    <div th:if="${c.status?.name() == 'PENDING'}" class="mt-4 p-4 bg-light rounded text-end border border-warning">
                        <span class="text-danger fw-bold me-3"><i class="fas fa-exclamation-circle"></i> Vui lòng phản hồi hợp đồng này:</span>
                        <form th:action="@{/resident-dashboard/contracts/respond}" method="POST" class="d-inline">
                            <input type="hidden" name="contractId" th:value="${c.id}">
                            <input type="hidden" name="action" value="REJECT">
                            <button type="submit" class="btn btn-outline-danger me-2">Từ chối</button>
                        </form>
                        <form th:action="@{/resident-dashboard/contracts/respond}" method="POST" class="d-inline">
                            <input type="hidden" name="contractId" th:value="${c.id}">
                            <input type="hidden" name="action" value="CONFIRM">
                            <button type="submit" class="btn btn-success">Đồng ý & Ký kết</button>
                        </form>
                    </div>
                </div>
            </div>

            <div th:if="${totalPages > 1}" class="d-flex justify-content-center mt-4">
                <nav><ul class="pagination"><li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i ? 'active' : ''}"><a class="page-link" th:href="@{/resident-dashboard/contracts(pageNo=${i})}" th:text="${i}"></a></li></ul></nav>
            </div>
        </div>
    </div>
</div>
</body>
</html>
