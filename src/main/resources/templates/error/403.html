<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 — Không có quyền truy cập | CondoCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .error-card { background: #fff; border-radius: 1.5rem; padding: 3rem 2.5rem; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.10); }
        .error-icon { font-size: 5rem; color: #e63946; margin-bottom: 1rem; }
        .error-code { font-size: 5rem; font-weight: 800; color: #e63946; line-height: 1; }
        .error-title { font-size: 1.4rem; font-weight: 700; color: #2d3748; margin-bottom: .5rem; }
        .error-msg { color: #718096; margin-bottom: 2rem; }
        .btn-home { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 0.75rem; padding: .75rem 2rem; font-weight: 700; text-decoration: none; display: inline-block; transition: opacity .2s; }
        .btn-home:hover { opacity: .88; color: #fff; }
        .btn-back { color: #667eea; font-weight: 600; text-decoration: none; margin-left: 1rem; }
        .btn-back:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="error-card">
    <div class="error-icon"><i class="fas fa-lock"></i></div>
    <div class="error-code">403</div>
    <div class="error-title mt-2">Không có quyền truy cập</div>
    <p class="error-msg">Bạn không có quyền xem trang này.<br>Vui lòng liên hệ quản trị viên nếu bạn cho rằng đây là nhầm lẫn.</p>
    <div>
        <a href="javascript:history.back()" class="btn-home"><i class="fas fa-arrow-left me-2"></i>Quay lại</a>
        <a href="/" class="btn-back">Trang chủ</a>
    </div>
</div>
<script src="/js/common.js" defer></script>
<script defer>
    // Tự động chuyển về trang phù hợp với role sau 5 giây nếu đã đăng nhập
    document.addEventListener('DOMContentLoaded', () => {
        const info = typeof getUserInfo === 'function' ? getUserInfo() : null;
        if (!info) return;
        const homeMap = {
            ADMIN: '/dashboard', MANAGER: '/dashboard',
            ACCOUNTANT: '/dashboard/invoices', TECHNICIAN: '/dashboard/service-requests',
            RECEPTIONIST: '/dashboard/vehicles',
        };
        const residentHome = '/resident';
        const home = info.userType === 'staff' ? (homeMap[info.role?.toUpperCase()] || '/dashboard') : residentHome;
        const note = document.createElement('p');
        note.className = 'text-muted small mt-3';
        note.id = 'autoRedirectNote';
        note.textContent = `Tự động chuyển về trang chủ sau 5 giây...`;
        document.querySelector('.error-card').appendChild(note);
        let sec = 5;
        const iv = setInterval(() => {
            sec--;
            const n = document.getElementById('autoRedirectNote');
            if (n) n.textContent = `Tự động chuyển về trang chủ sau ${sec} giây...`;
            if (sec <= 0) { clearInterval(iv); window.location.href = home; }
        }, 1000);
    });
</script>
</body>
</html>
