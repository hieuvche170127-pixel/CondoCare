<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm/Sửa Thẻ Ra Vào - CondoCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="loading" class="loading"><div class="spinner"></div></div>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
            <div class="position-sticky pt-3">
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-tachometer-alt"></i> Tổng quan</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/buildings"><i class="fas fa-building"></i> Tòa nhà</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/apartments"><i class="fas fa-home"></i> Căn hộ</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/residents"><i class="fas fa-users"></i> Cư dân</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/dashboard/access-cards"><i class="fas fa-id-card"></i> Thẻ ra vào</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/vehicles"><i class="fas fa-motorcycle"></i> Phương tiện</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/contracts"><i class="fas fa-file-signature"></i> Hợp đồng</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/fees"><i class="fas fa-file-invoice-dollar"></i> Phí dịch vụ</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/invoices"><i class="fas fa-receipt"></i> Hóa đơn</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/reports"><i class="fas fa-chart-bar"></i> Báo cáo</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard/settings"><i class="fas fa-cog"></i> Cài đặt</a></li>
                    <li class="nav-item mt-4"><a class="nav-link" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a></li>
                </ul>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2" th:text="${isEdit ? 'Chỉnh sửa Thẻ ra vào' : 'Cấp mới Thẻ ra vào'}">Cấp Thẻ</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <a th:href="@{/dashboard/access-cards}" class="btn btn-sm btn-outline-secondary">
                        <i class="fas fa-arrow-left"></i> Quay lại
                    </a>
                </div>
            </div>

            <div class="card shadow col-lg-8 mx-auto mb-5">
                <div class="card-header bg-white">
                    <h6 class="m-0 font-weight-bold">Thông tin Thẻ Ra Vào</h6>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/dashboard/access-cards/save}" th:object="${accessCard}" method="POST">

                        <input type="hidden" name="isEdit" th:value="${isEdit}">

                        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-triangle me-1"></i> <strong th:text="${errorMessage}"></strong>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Mã hệ thống (ID) <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{id}" maxlength="10" required
                                       th:readonly="${isEdit}"
                                       th:style="${isEdit ? 'background-color: #e9ecef;' : ''}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Mã thẻ vật lý <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{cardNumber}" maxlength="8" required placeholder="VD: CARD001">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Cấp cho cư dân <span class="text-danger">*</span></label>
                                <select class="form-select" th:field="*{resident.id}" required>
                                    <option value="">-- Chọn cư dân --</option>
                                    <option th:each="r : ${residents}" th:value="${r.id}" th:text="${r.fullName}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nhân viên cấp phát</label>
                                <select class="form-select" th:field="*{issuedBy.id}">
                                    <option value="">-- Chọn nhân viên --</option>
                                    <option th:each="s : ${staffs}" th:value="${s.id}" th:text="${s.fullName}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Thời hạn sử dụng</label>
                                <input type="datetime-local" class="form-control" th:field="*{expiredAt}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Trạng thái thẻ</label>
                                <select class="form-select" th:field="*{status}">
                                    <option value="ACTIVE">Đang hoạt động (ACTIVE)</option>
                                    <option value="BLOCKED">Bị khóa (BLOCKED)</option>
                                    <option value="LOST">Báo mất (LOST)</option>
                                </select>
                            </div>
                        </div>

                        <hr>
                        <div class="text-end mt-3">
                            <a th:href="@{/dashboard/access-cards}" class="btn btn-light me-2">Hủy bỏ</a>
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Lưu thông tin</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/common.js"></script>
</body>
</html>
