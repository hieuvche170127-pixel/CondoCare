<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông báo - Cư dân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/resident.css">

</head>
<body>
<div id="loading" class="loading"><div class="spinner"></div></div>

<div class="resident-wrapper">
    <nav class="resident-sidebar" id="residentSidebar"></nav>
    <button class="mobile-toggle" id="mobileToggle"><i class="fas fa-bars"></i></button>

    <main class="resident-main">
        <div class="page-header">
            <div>
                <h4><i class="fas fa-bell"></i> Thông báo</h4>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="/resident">Trang chủ</a></li>
                        <li class="breadcrumb-item active">Thông báo</li>
                    </ol>
                </nav>
            </div>
            <button class="btn btn-sm btn-outline-primary" id="btnReadAll">
                <i class="fas fa-check-double"></i> Đánh dấu tất cả đã đọc
            </button>
        </div>

        <div id="alertContainer"></div>

        <!-- Bộ lọc loại -->
        <div class="content-card mb-3">
            <div class="d-flex gap-2 flex-wrap">
                <button class="btn btn-sm btn-primary filter-btn active" data-filter="ALL">Tất cả</button>
                <button class="btn btn-sm btn-outline-info filter-btn"    data-filter="INFO">Thông tin</button>
                <button class="btn btn-sm btn-outline-warning filter-btn" data-filter="WARNING">Cảnh báo</button>
                <button class="btn btn-sm btn-outline-danger filter-btn"  data-filter="URGENT">Khẩn cấp</button>
                <button class="btn btn-sm btn-outline-secondary filter-btn" data-filter="MAINTENANCE">Bảo trì</button>
                <button class="btn btn-sm btn-outline-primary filter-btn" data-filter="PAYMENT">Thanh toán</button>
            </div>
        </div>

        <!-- Danh sách thông báo -->
        <div class="content-card">
            <div id="notifList">
                <div class="empty-state"><i class="fas fa-spinner fa-spin d-block"></i><p>Đang tải...</p></div>
            </div>
        </div>
    </main>
</div>

<!-- Modal xem nội dung -->
<div class="modal fade" id="notifModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header" id="modalHeader">
                <h5 class="modal-title" id="modalTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p id="modalMeta" class="text-muted small mb-3"></p>
                <div id="modalContent" style="white-space: pre-line; line-height: 1.8;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/common.js"></script>
<script src="/js/resident-common.js"></script>
<script>
    requireResidentLogin();
    renderResidentSidebar('notifications');
    document.getElementById('mobileToggle').addEventListener('click', () =>
        document.getElementById('residentSidebar').classList.toggle('open'));

    let allNotifs = [];
    let currentFilter = 'ALL';
    const modal = new bootstrap.Modal(document.getElementById('notifModal'));

    // ── Load thông báo ────────────────────────────────────────
    async function loadNotifications() {
        showLoading();
        try {
            const res  = await apiRequest(`${API_BASE_URL}/resident/notifications`);
            allNotifs  = await res.json();
            renderList();
        } catch(e) {
            showResidentAlert('alertContainer', 'Không thể tải thông báo.');
        } finally { hideLoading(); }
    }

    // ── Render theo filter ────────────────────────────────────
    function renderList() {
        const list = currentFilter === 'ALL'
            ? allNotifs
            : allNotifs.filter(n => n.type === currentFilter);

        if (!list.length) {
            document.getElementById('notifList').innerHTML =
                `<div class="empty-state">
                    <i class="fas fa-bell-slash d-block mb-2"></i>
                    <p>Không có thông báo nào</p>
                </div>`;
            return;
        }

        document.getElementById('notifList').innerHTML = list.map(n => {
            const t = NOTIF_TYPE[n.type] || NOTIF_TYPE.INFO;
            return `
            <div class="notif-item ${n.isRead ? '' : 'unread'}"
                 onclick="openNotif('${n.id}', this)"
                 data-id="${n.id}">
                <div class="d-flex justify-content-between align-items-start">
                    <div class="d-flex gap-2 align-items-center">
                        <span class="badge ${t.cls}"><i class="fas ${t.icon} me-1"></i>${t.label}</span>
                        ${n.isPersonal ? '<span class="badge bg-light text-dark border"><i class="fas fa-user me-1"></i>Cá nhân</span>' : ''}
                        <span class="notif-title">${n.title}</span>
                    </div>
                    ${!n.isRead ? '<span class="badge bg-primary">Mới</span>' : ''}
                </div>
                <div class="notif-content mt-2">${n.content.substring(0, 120)}${n.content.length > 120 ? '...' : ''}</div>
                <div class="notif-meta">
                    <i class="fas fa-user me-1"></i>${n.createdBy} &nbsp;·&nbsp;
                    <i class="fas fa-clock me-1"></i>${formatDateTime(n.createdAt)}
                </div>
            </div>`;
        }).join('');
    }

    // ── Mở modal xem chi tiết ─────────────────────────────────
    async function openNotif(id, el) {
        const n = allNotifs.find(x => x.id === id);
        if (!n) return;

        const t = NOTIF_TYPE[n.type] || NOTIF_TYPE.INFO;
        document.getElementById('modalHeader').className = `modal-header text-white ${t.cls}`;
        document.getElementById('modalTitle').textContent  = n.title;
        document.getElementById('modalContent').textContent = n.content;
        document.getElementById('modalMeta').innerHTML =
            `<i class="fas fa-user me-1"></i>${n.createdBy} &nbsp;·&nbsp;
             <i class="fas fa-clock me-1"></i>${formatDateTime(n.createdAt)}`;
        modal.show();

        // Đánh dấu đã đọc nếu chưa
        if (!n.isRead) {
            n.isRead = true;
            el.classList.remove('unread');
            el.querySelector('.badge.bg-primary')?.remove();
            await apiRequest(`${API_BASE_URL}/resident/notifications/${id}/read`, { method: 'PUT' });
            // Cập nhật unread count
            const cnt = allNotifs.filter(x => !x.isRead).length;
            localStorage.setItem('unreadCount', cnt);
        }
    }

    // ── Đánh dấu tất cả đã đọc ───────────────────────────────
    document.getElementById('btnReadAll').addEventListener('click', async () => {
        try {
            await apiRequest(`${API_BASE_URL}/resident/notifications/read-all`, { method: 'PUT' });
            allNotifs.forEach(n => n.isRead = true);
            localStorage.setItem('unreadCount', 0);
            renderList();
            showResidentAlert('alertContainer', 'Đã đánh dấu tất cả là đã đọc.', 'success');
        } catch(e) { showResidentAlert('alertContainer', 'Có lỗi xảy ra.'); }
    });

    // ── Filter buttons ────────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('btn-primary','btn-info','btn-warning','btn-danger','btn-secondary');
                b.classList.add('btn-outline-' + (b.dataset.filter === 'ALL' ? 'primary' :
                    b.dataset.filter === 'INFO' ? 'info' :
                    b.dataset.filter === 'WARNING' ? 'warning' :
                    b.dataset.filter === 'URGENT' ? 'danger' : 'secondary'));
            });
            this.className = `btn btn-sm filter-btn btn-${
                this.dataset.filter === 'ALL' ? 'primary' :
                this.dataset.filter === 'INFO' ? 'info' :
                this.dataset.filter === 'WARNING' ? 'warning' :
                this.dataset.filter === 'URGENT' ? 'danger' : 'secondary'}`;
            currentFilter = this.dataset.filter;
            renderList();
        });
    });

    loadNotifications();
</script>
</body>
</html>
