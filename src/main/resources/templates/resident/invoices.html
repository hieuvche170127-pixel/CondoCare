<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa đơn - Cư dân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/resident.css">
</head>
<body>
<div id="loading" class="loading"><div class="spinner"></div></div>

<div class="resident-wrapper">
    <nav class="resident-sidebar" id="residentSidebar"></nav>
    <button class="mobile-toggle" id="mobileToggle"><i class="fas fa-bars"></i></button>

    <main class="resident-main">
        <div class="page-header">
            <div>
                <h4><i class="fas fa-file-invoice-dollar"></i> Hóa đơn của tôi</h4>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="/resident">Trang chủ</a></li>
                        <li class="breadcrumb-item active">Hóa đơn</li>
                    </ol>
                </nav>
            </div>
        </div>

        <div id="alertContainer"></div>

        <!-- Tóm tắt nhanh -->
        <div class="row g-3 mb-4" id="invoiceSummary"></div>

        <!-- Bảng hóa đơn -->
        <div class="content-card">
            <div class="card-title"><i class="fas fa-list me-2"></i>Danh sách hóa đơn</div>
            <div class="table-responsive">
                <table class="table table-hover invoice-table align-middle" id="invoiceTable">
                    <thead>
                        <tr>
                            <th>Tháng</th>
                            <th>Điện (kWh)</th>
                            <th>Nước (m³)</th>
                            <th class="text-end">Tiền điện</th>
                            <th class="text-end">Tiền nước</th>
                            <th class="text-end">Phí DV</th>
                            <th class="text-end">Phí xe</th>
                            <th class="text-end">Tổng cộng</th>
                            <th class="text-center">Trạng thái</th>
                            <th class="text-center">Hạn đóng</th>
                        </tr>
                    </thead>
                    <tbody id="invoiceBody">
                        <tr><td colspan="10" class="text-center py-4"><i class="fas fa-spinner fa-spin"></i> Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Modal chi tiết hóa đơn -->
<div class="modal fade" id="invModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="invModalTitle">Chi tiết hóa đơn</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="invModalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="/css/style.css">
<script src="/js/common.js"></script>
<script src="/js/resident-common.js"></script>
<script>
    requireResidentLogin();
    renderResidentSidebar('invoices');
    document.getElementById('mobileToggle').addEventListener('click', () =>
        document.getElementById('residentSidebar').classList.toggle('open'));

    let invoices = [];
    const invModal = new bootstrap.Modal(document.getElementById('invModal'));

    async function loadInvoices() {
        showLoading();
        try {
            const res = await apiRequest(`${API_BASE_URL}/resident/invoices`);
            invoices  = await res.json();
            renderSummary();
            renderTable();
        } catch(e) {
            showResidentAlert('alertContainer', 'Không thể tải hóa đơn.');
        } finally { hideLoading(); }
    }

    function renderSummary() {
        const unpaid  = invoices.filter(i => i.status === 'UNPAID').length;
        const paid    = invoices.filter(i => i.status === 'PAID').length;
        const overdue = invoices.filter(i => i.status === 'OVERDUE').length;
        const totalUnpaidAmt = invoices.filter(i => i.status !== 'PAID')
            .reduce((s, i) => s + parseFloat(i.totalAmt || 0), 0);

        document.getElementById('invoiceSummary').innerHTML = `
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon icon-red"><i class="fas fa-exclamation"></i></div>
                    <div><div class="stat-value">${unpaid}</div><div class="stat-label">Chưa thanh toán</div></div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon icon-green"><i class="fas fa-check"></i></div>
                    <div><div class="stat-value">${paid}</div><div class="stat-label">Đã thanh toán</div></div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon icon-orange"><i class="fas fa-clock"></i></div>
                    <div><div class="stat-value">${overdue}</div><div class="stat-label">Quá hạn</div></div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon icon-purple"><i class="fas fa-money-bill"></i></div>
                    <div><div class="stat-value" style="font-size:1.1rem">${formatVND(totalUnpaidAmt)}</div><div class="stat-label">Tổng cần đóng</div></div>
                </div>
            </div>`;
    }

    function renderTable() {
        if (!invoices.length) {
            document.getElementById('invoiceBody').innerHTML =
                `<tr><td colspan="10"><div class="empty-state"><i class="fas fa-file-invoice d-block mb-2"></i><p>Chưa có hóa đơn nào</p></div></td></tr>`;
            return;
        }
        document.getElementById('invoiceBody').innerHTML = invoices.map(inv => {
            const s = INV_STATUS[inv.status] || INV_STATUS.UNPAID;
            return `
            <tr style="cursor:pointer" onclick="openDetail('${inv.id}')">
                <td><strong>Tháng ${inv.month}/${inv.year}</strong></td>
                <td>${inv.electricKwh || 0}</td>
                <td>${inv.waterM3 || 0}</td>
                <td class="text-end">${formatVND(inv.electricAmt)}</td>
                <td class="text-end">${formatVND(inv.waterAmt)}</td>
                <td class="text-end">${formatVND(inv.serviceAmt)}</td>
                <td class="text-end">${formatVND(inv.parkingAmt)}</td>
                <td class="text-end invoice-total">${formatVND(inv.totalAmt)}</td>
                <td class="text-center"><span class="badge ${s.cls}">${s.label}</span></td>
                <td class="text-center">${formatDate(inv.dueDate)}</td>
            </tr>`;
        }).join('');
    }

    function openDetail(id) {
        const inv = invoices.find(i => i.id === id);
        if (!inv) return;
        const s = INV_STATUS[inv.status] || INV_STATUS.UNPAID;

        document.getElementById('invModalTitle').textContent = `Hóa đơn Tháng ${inv.month}/${inv.year}`;
        document.getElementById('invModalBody').innerHTML = `
            <table class="table table-borderless table-sm">
                <tr><td class="text-muted">Trạng thái</td><td><span class="badge ${s.cls}">${s.label}</span></td></tr>
                <tr><td class="text-muted">Hạn thanh toán</td><td>${formatDate(inv.dueDate)}</td></tr>
                ${inv.paidAt ? `<tr><td class="text-muted">Ngày đã thanh toán</td><td>${formatDateTime(inv.paidAt)}</td></tr>` : ''}
                <tr><td colspan="2"><hr class="my-2"></td></tr>
                <tr><td>Điện (${inv.electricKwh} kWh)</td><td class="text-end">${formatVND(inv.electricAmt)}</td></tr>
                <tr><td>Nước (${inv.waterM3} m³)</td><td class="text-end">${formatVND(inv.waterAmt)}</td></tr>
                <tr><td>Phí dịch vụ</td><td class="text-end">${formatVND(inv.serviceAmt)}</td></tr>
                <tr><td>Phí gửi xe</td><td class="text-end">${formatVND(inv.parkingAmt)}</td></tr>
                <tr class="fw-bold"><td>TỔNG CỘNG</td><td class="text-end text-danger">${formatVND(inv.totalAmt)}</td></tr>
            </table>`;
        invModal.show();
    }

    loadInvoices();
</script>
</body>
</html>
