<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa đơn - Cư dân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/resident.css">
</head>
<body>
<div id="loading" class="loading"><div class="spinner"></div></div>

<div class="resident-wrapper">
    <!-- Sidebar inject bởi renderResidentSidebar() -->
    <nav class="resident-sidebar" id="residentSidebar"></nav>

    <button class="mobile-toggle" id="mobileToggle">
        <i class="fas fa-bars"></i>
    </button>

    <main class="resident-main">

        <!-- Page header -->
        <div class="page-header">
            <div>
                <h4><i class="fas fa-file-invoice-dollar"></i> Hóa đơn của tôi</h4>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="/resident">Trang chủ</a></li>
                        <li class="breadcrumb-item active">Hóa đơn</li>
                    </ol>
                </nav>
            </div>
        </div>

        <div id="alertContainer"></div>

        <!-- Stat cards -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon icon-blue"><i class="fas fa-file-invoice"></i></div>
                    <div>
                        <div class="stat-value" id="statTotal">—</div>
                        <div class="stat-label">Tổng hóa đơn</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon icon-orange"><i class="fas fa-clock"></i></div>
                    <div>
                        <div class="stat-value" id="statUnpaid">—</div>
                        <div class="stat-label">Chưa thanh toán</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon icon-green"><i class="fas fa-check-circle"></i></div>
                    <div>
                        <div class="stat-value" id="statPaid">—</div>
                        <div class="stat-label">Đã thanh toán</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon icon-red"><i class="fas fa-exclamation-circle"></i></div>
                    <div>
                        <div class="stat-value" id="statOverdue">—</div>
                        <div class="stat-label">Quá hạn</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter bar -->
        <div class="content-card mb-3">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small text-muted mb-1">Trạng thái</label>
                    <select class="form-select form-select-sm" id="filterStatus">
                        <option value="all">— Tất cả —</option>
                        <option value="UNPAID">Chưa thanh toán</option>
                        <option value="PAID">Đã thanh toán</option>
                        <option value="OVERDUE">Quá hạn</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted mb-1">Tháng</label>
                    <select class="form-select form-select-sm" id="filterMonth">
                        <option value="">— Tháng —</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted mb-1">Năm</label>
                    <select class="form-select form-select-sm" id="filterYear">
                        <option value="">— Năm —</option>
                        <option value="2026">2026</option>
                        <option value="2025">2025</option>
                        <option value="2024">2024</option>
                    </select>
                </div>
                <div class="col-auto">
                    <button class="btn btn-primary btn-sm" onclick="loadInvoices()">
                        <i class="fas fa-search me-1"></i>Lọc
                    </button>
                    <button class="btn btn-outline-secondary btn-sm ms-1" onclick="resetFilter()">
                        <i class="fas fa-redo"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="content-card p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-3">Kỳ</th>
                        <th class="text-end">Tiền điện</th>
                        <th class="text-end">Tiền nước</th>
                        <th class="text-end">Dịch vụ</th>
                        <th class="text-end">Phí xe</th>
                        <th class="text-end fw-bold">Tổng cộng</th>
                        <th>Trạng thái</th>
                        <th>Hạn TT</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody id="invoiceTableBody">
                    <tr><td colspan="9" class="text-center py-4 text-muted">
                        <i class="fas fa-spinner fa-spin me-2"></i>Đang tải...
                    </td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
</div>

<!-- Modal chi tiết hóa đơn -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-file-invoice text-primary me-2"></i>Chi tiết hóa đơn
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detailBody">Đang tải...</div>
            <div class="modal-footer" id="detailFooter">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/common.js"></script>
<script src="/js/resident-common.js"></script>
<script>
    // ── Khởi tạo ──────────────────────────────────────────────
    requireResidentLogin();
    renderResidentSidebar('invoices');

    document.getElementById('mobileToggle').addEventListener('click', () =>
        document.getElementById('residentSidebar').classList.toggle('open'));

    // Populate tháng
    const fMonth = document.getElementById('filterMonth');
    for (let m = 1; m <= 12; m++) {
        const o = document.createElement('option');
        o.value = m;
        o.textContent = 'Tháng ' + m;
        fMonth.appendChild(o);
    }

    // ── Load danh sách ─────────────────────────────────────────
    async function loadInvoices() {
        const status = document.getElementById('filterStatus').value;
        const month  = document.getElementById('filterMonth').value;
        const year   = document.getElementById('filterYear').value;

        // Nếu chọn tháng mà chưa chọn năm → tự dùng năm hiện tại
        const resolvedYear = year || (month ? String(new Date().getFullYear()) : '');

        const params = new URLSearchParams({ filterType: 'all' });
        if (status && status !== 'all') params.set('status', status);
        if (month && resolvedYear) {
            params.set('month', month);
            params.set('year', resolvedYear);
            params.set('filterType', 'month');
        } else if (resolvedYear && !month) {
            params.set('year', resolvedYear);
            params.set('filterType', 'year');
        }

        const tbody = document.getElementById('invoiceTableBody');
        tbody.innerHTML = `<tr><td colspan="9" class="text-center py-4 text-muted">
            <i class="fas fa-spinner fa-spin me-2"></i>Đang tải...</td></tr>`;

        showLoading();
        try {
            const res  = await apiRequest(`${API_BASE_URL}/resident/invoices?${params}`);
            if (!res.ok) throw new Error(await res.text());
            const list = await res.json();
            renderTable(list);
            updateStats(list);
        } catch(e) {
            tbody.innerHTML = `<tr><td colspan="9" class="text-center text-danger py-4">
                <i class="fas fa-exclamation-circle me-2"></i>Không thể tải dữ liệu: ${e.message}
            </td></tr>`;
            showResidentAlert('alertContainer', 'Không thể tải hóa đơn: ' + e.message);
        } finally { hideLoading(); }
    }

    // ── Render bảng ────────────────────────────────────────────
    function renderTable(list) {
        const tbody = document.getElementById('invoiceTableBody');
        if (!list || !list.length) {
            tbody.innerHTML = `<tr><td colspan="9" class="text-center py-5 text-muted">
                <i class="fas fa-file-invoice fa-2x mb-2 d-block opacity-25"></i>
                Không có hóa đơn nào
            </td></tr>`;
            return;
        }

        const statusCls   = { UNPAID:'bg-warning text-dark', PAID:'bg-success', OVERDUE:'bg-danger' };
        const statusLabel = { UNPAID:'Chưa thanh toán', PAID:'Đã thanh toán', OVERDUE:'Quá hạn' };

        tbody.innerHTML = list.map(inv => {
            const isOverdue = inv.status === 'OVERDUE';
            const isUnpaid  = inv.status === 'UNPAID';
            // Escape JSON for onclick attribute
            const invJson = JSON.stringify(inv).replace(/'/g, "\\'");
            return `
            <tr class="${isOverdue ? 'table-danger' : ''}">
                <td class="ps-3">
                    <div class="fw-semibold">Tháng ${inv.month}/${inv.year}</div>
                    <small class="text-muted font-monospace">${inv.id}</small>
                </td>
                <td class="text-end">${fmtVND(inv.electricAmount ?? inv.electricAmt)}</td>
                <td class="text-end">${fmtVND(inv.waterAmount    ?? inv.waterAmt)}</td>
                <td class="text-end">${fmtVND(inv.serviceAmount  ?? inv.serviceAmt)}</td>
                <td class="text-end">${fmtVND(inv.parkingAmount  ?? inv.parkingAmt)}</td>
                <td class="text-end fw-bold ${isOverdue ? 'text-danger' : 'text-primary'}">
                    ${fmtVND(inv.totalAmount ?? inv.totalAmt)}
                </td>
                <td>
                    <span class="badge ${statusCls[inv.status] || 'bg-secondary'}">
                        ${statusLabel[inv.status] || inv.status}
                    </span>
                </td>
                <td>
                    <small class="${isOverdue ? 'text-danger fw-semibold' : ''}">${inv.dueDate || '—'}</small>
                    ${isOverdue ? '<br><small class="text-danger"><i class="fas fa-exclamation-triangle"></i> Quá hạn!</small>' : ''}
                </td>
                <td>
                    <div class="d-flex gap-1">
                        <button class="btn btn-sm btn-outline-info"
                                onclick="openDetail(invoiceMap['${inv.id}'])"
                                title="Xem chi tiết">
                            <i class="fas fa-eye"></i>
                        </button>
                        ${(isUnpaid || isOverdue) ? `
                        <button class="btn btn-sm btn-outline-success"
                                onclick="markPaid('${inv.id}')"
                                title="Thanh toán">
                            <i class="fas fa-credit-card"></i>
                        </button>` : ''}
                    </div>
                </td>
            </tr>`;
        }).join('');

        // Lưu map để dùng trong onclick (tránh escape JSON phức tạp)
        window.invoiceMap = {};
        list.forEach(inv => window.invoiceMap[inv.id] = inv);
    }

    // ── Stat cards ─────────────────────────────────────────────
    function updateStats(list) {
        document.getElementById('statTotal').textContent   = list.length;
        document.getElementById('statUnpaid').textContent  = list.filter(i => i.status === 'UNPAID').length;
        document.getElementById('statPaid').textContent    = list.filter(i => i.status === 'PAID').length;
        document.getElementById('statOverdue').textContent = list.filter(i => i.status === 'OVERDUE').length;
    }

    // ── Reset filter ───────────────────────────────────────────
    function resetFilter() {
        document.getElementById('filterStatus').value = 'all';
        document.getElementById('filterMonth').value  = '';
        document.getElementById('filterYear').value   = '';
        loadInvoices();
    }

    // ── Modal chi tiết ─────────────────────────────────────────
    function openDetail(inv) {
        if (!inv) return;
        const statusCls   = { UNPAID:'bg-warning text-dark', PAID:'bg-success', OVERDUE:'bg-danger' };
        const statusLabel = { UNPAID:'Chưa thanh toán', PAID:'Đã thanh toán', OVERDUE:'Quá hạn' };

        const elAmt = inv.electricAmount ?? inv.electricAmt ?? 0;
        const waAmt = inv.waterAmount    ?? inv.waterAmt    ?? 0;
        const svAmt = inv.serviceAmount  ?? inv.serviceAmt  ?? 0;
        const pkAmt = inv.parkingAmount  ?? inv.parkingAmt  ?? 0;
        const total = inv.totalAmount    ?? inv.totalAmt    ?? 0;

        document.getElementById('detailBody').innerHTML = `
            <div class="row g-3">
                <div class="col-6">
                    <label class="text-muted small">Mã hóa đơn</label>
                    <div class="fw-bold font-monospace">${inv.id}</div>
                </div>
                <div class="col-6">
                    <label class="text-muted small">Trạng thái</label>
                    <div><span class="badge ${statusCls[inv.status] || 'bg-secondary'}">
                        ${statusLabel[inv.status] || inv.status}
                    </span></div>
                </div>
                <div class="col-6">
                    <label class="text-muted small">Kỳ hóa đơn</label>
                    <div class="fw-semibold">Tháng ${inv.month}/${inv.year}</div>
                </div>
                <div class="col-6">
                    <label class="text-muted small">Hạn thanh toán</label>
                    <div class="${inv.status === 'OVERDUE' ? 'text-danger fw-semibold' : ''}">${inv.dueDate || '—'}</div>
                </div>
                <div class="col-12"><hr class="my-1"></div>

                <div class="col-6 col-md-3">
                    <div class="border rounded p-2 text-center">
                        <div class="text-warning mb-1"><i class="fas fa-bolt fa-lg"></i></div>
                        <div class="text-muted small">Tiền điện</div>
                        <div class="fw-semibold">${fmtVND(elAmt)}</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="border rounded p-2 text-center">
                        <div class="text-info mb-1"><i class="fas fa-tint fa-lg"></i></div>
                        <div class="text-muted small">Tiền nước</div>
                        <div class="fw-semibold">${fmtVND(waAmt)}</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="border rounded p-2 text-center">
                        <div class="text-secondary mb-1"><i class="fas fa-building fa-lg"></i></div>
                        <div class="text-muted small">Phí quản lý</div>
                        <div class="fw-semibold">${fmtVND(svAmt)}</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="border rounded p-2 text-center">
                        <div class="text-secondary mb-1"><i class="fas fa-parking fa-lg"></i></div>
                        <div class="text-muted small">Phí xe</div>
                        <div class="fw-semibold">${fmtVND(pkAmt)}</div>
                    </div>
                </div>

                <div class="col-12">
                    <div class="bg-primary bg-opacity-10 rounded p-3 text-center">
                        <div class="text-muted small mb-1">Tổng cộng phải thanh toán</div>
                        <div class="fw-bold fs-3 text-primary">${fmtVND(total)}</div>
                    </div>
                </div>

                ${inv.paidAt ? `
                <div class="col-12">
                    <div class="alert alert-success py-2 mb-0">
                        <i class="fas fa-check-circle me-2"></i>
                        Đã thanh toán lúc <strong>${new Date(inv.paidAt).toLocaleString('vi-VN')}</strong>
                    </div>
                </div>` : ''}

                <div class="col-12">
                    <small class="text-muted">Người tạo: ${inv.createdBy || 'Ban quản lý'}</small>
                </div>
            </div>`;

        const footer = document.getElementById('detailFooter');
        footer.innerHTML = '';
        if (inv.status !== 'PAID') {
            footer.innerHTML = `
                <button class="btn btn-success me-2" onclick="markPaid('${inv.id}', true)">
                    <i class="fas fa-credit-card me-1"></i>Thanh toán ngay
                </button>`;
        }
        footer.innerHTML += '<button class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>';

        new bootstrap.Modal(document.getElementById('detailModal')).show();
    }

    // ── Thanh toán ─────────────────────────────────────────────
    async function markPaid(id, fromDetail = false) {
        if (!confirm('Xác nhận thanh toán hóa đơn này?')) return;
        showLoading();
        try {
            const res = await apiRequest(`${API_BASE_URL}/resident/invoices/${id}/pay`, { method: 'PUT' });
            if (!res.ok) { showResidentAlert('alertContainer', await res.text()); return; }
            if (fromDetail) bootstrap.Modal.getInstance(document.getElementById('detailModal'))?.hide();
            showResidentAlert('alertContainer', 'Thanh toán thành công!', 'success');
            loadInvoices();
        } catch(e) {
            showResidentAlert('alertContainer', 'Lỗi: ' + e.message);
        } finally { hideLoading(); }
    }

    // ── Helper format tiền ────────────────────────────────────
    function fmtVND(amount) {
        if (amount == null || amount === 0) return '<span class="text-muted">—</span>';
        return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
    }

    // Load khi page sẵn sàng
    loadInvoices();
</script>
</body>
</html>
