<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa đơn - Cư dân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/resident.css">
</head>
<body>
<div id="loading" class="loading"><div class="spinner"></div></div>

<div class="resident-wrapper">
    <nav class="resident-sidebar" id="residentSidebar"></nav>
    <button class="mobile-toggle" id="mobileToggle"><i class="fas fa-bars"></i></button>

    <main class="resident-main">
        <div class="page-header">
            <div>
                <h4><i class="fas fa-file-invoice-dollar"></i> Hóa đơn của tôi</h4>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="/resident">Trang chủ</a></li>
                        <li class="breadcrumb-item active">Hóa đơn</li>
                    </ol>
                </nav>
            </div>
        </div>

        <div id="alertContainer"></div>

        <!-- ── Filter Bar ─────────────────────────────────── -->
        <div class="content-card mb-3">
            <div class="d-flex flex-wrap gap-2 align-items-end">
                <div>
                    <label class="form-label small mb-1 fw-semibold">🔍 Tìm kiếm</label>
                    <input type="text" id="filterKeyword" class="form-control form-control-sm"
                           placeholder="Tên hóa đơn..." style="width:180px"
                           onkeydown="if(event.key==='Enter') applyFilter()">
                </div>
                <div>
                    <label class="form-label small mb-1 fw-semibold">📅 Lọc theo</label>
                    <select id="filterType" class="form-select form-select-sm" style="width:130px"
                            onchange="toggleFilterInputs()">
                        <option value="all">Tất cả</option>
                        <option value="month">Tháng</option>
                        <option value="quarter">Quý</option>
                        <option value="year">Năm</option>
                    </select>
                </div>
                <div id="monthGroup" style="display:none">
                    <label class="form-label small mb-1 fw-semibold">Tháng</label>
                    <select id="filterMonth" class="form-select form-select-sm" style="width:110px">
                        <option value="1">Tháng 1</option><option value="2">Tháng 2</option>
                        <option value="3">Tháng 3</option><option value="4">Tháng 4</option>
                        <option value="5">Tháng 5</option><option value="6">Tháng 6</option>
                        <option value="7">Tháng 7</option><option value="8">Tháng 8</option>
                        <option value="9">Tháng 9</option><option value="10">Tháng 10</option>
                        <option value="11">Tháng 11</option><option value="12">Tháng 12</option>
                    </select>
                </div>
                <div id="quarterGroup" style="display:none">
                    <label class="form-label small mb-1 fw-semibold">Quý</label>
                    <select id="filterQuarter" class="form-select form-select-sm" style="width:150px">
                        <option value="1">Quý 1 (T1–T3)</option>
                        <option value="2">Quý 2 (T4–T6)</option>
                        <option value="3">Quý 3 (T7–T9)</option>
                        <option value="4">Quý 4 (T10–T12)</option>
                    </select>
                </div>
                <div id="yearGroup" style="display:none">
                    <label class="form-label small mb-1 fw-semibold">Năm</label>
                    <select id="filterYear" class="form-select form-select-sm" style="width:100px">
                        <option value="2023">2023</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                    </select>
                </div>
                <div>
                    <label class="form-label small mb-1 fw-semibold">Trạng thái</label>
                    <select id="filterStatus" class="form-select form-select-sm" style="width:170px">
                        <option value="ALL">Tất cả</option>
                        <option value="UNPAID">🔴 Chưa thanh toán</option>
                        <option value="PAID">✅ Đã thanh toán</option>
                        <option value="OVERDUE">⚫ Quá hạn</option>
                    </select>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <button class="btn btn-primary btn-sm" onclick="applyFilter()">
                        <i class="fas fa-filter me-1"></i>Lọc
                    </button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="resetFilter()">
                        <i class="fas fa-redo me-1"></i>Đặt lại
                    </button>
                </div>
            </div>
        </div>
        <div class="row g-3 mb-4" id="invoiceSummary"></div>

        <!-- Bảng hóa đơn -->
        <div class="content-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="card-title mb-0"><i class="fas fa-list me-2"></i>Danh sách hóa đơn</div>
                <button class="btn btn-success btn-sm" onclick="exportInvoicesToPDF()">
                    <i class="fas fa-file-pdf me-1"></i> Xuất PDF
                </button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover invoice-table align-middle" id="invoiceTable">
                    <thead>
                    <tr>
                        <th>Tháng</th>
                        <th>Điện (kWh)</th>
                        <th>Nước (m³)</th>
                        <th class="text-end">Tiền điện</th>
                        <th class="text-end">Tiền nước</th>
                        <th class="text-end">Phí DV</th>
                        <th class="text-end">Phí xe</th>
                        <th class="text-end">Tổng cộng</th>
                        <th class="text-center">Trạng thái</th>
                        <th class="text-center">Hạn đóng</th>
                    </tr>
                    </thead>
                    <tbody id="invoiceBody">
                    <tr><td colspan="10" class="text-center py-4"><i class="fas fa-spinner fa-spin"></i> Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Modal chi tiết hóa đơn -->
<div class="modal fade" id="invModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="invModalTitle">Chi tiết hóa đơn</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="invModalBody"></div>
            <div class="modal-footer" id="invModalFooter">
                <!-- Nút được render động -->
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="/css/style.css">
<script src="/js/common.js"></script>
<script src="/js/resident-common.js"></script>
<script>
    requireResidentLogin();
    renderResidentSidebar('invoices');
    document.getElementById('mobileToggle').addEventListener('click', () =>
        document.getElementById('residentSidebar').classList.toggle('open'));

    let invoices = [];
    const invModal = new bootstrap.Modal(document.getElementById('invModal'));

    // Khởi tạo tháng hiện tại
    document.getElementById('filterMonth').value = String(new Date().getMonth() + 1);

    // ── Toggle filter inputs ────────────────────────────────────
    function toggleFilterInputs() {
        const type = document.getElementById('filterType').value;
        document.getElementById('monthGroup').style.display   = type === 'month'   ? '' : 'none';
        document.getElementById('quarterGroup').style.display = type === 'quarter' ? '' : 'none';
        document.getElementById('yearGroup').style.display    = type !== 'all'     ? '' : 'none';
    }

    // ── Apply filter ────────────────────────────────────────────
    function applyFilter() {
        const params = new URLSearchParams();
        const filterType = document.getElementById('filterType').value;
        const keyword    = document.getElementById('filterKeyword').value.trim();
        const status     = document.getElementById('filterStatus').value;

        if (keyword) {
            params.set('keyword', keyword);
        } else {
            params.set('filterType', filterType);
            if (filterType === 'month') {
                params.set('month', document.getElementById('filterMonth').value);
                params.set('year',  document.getElementById('filterYear').value);
            } else if (filterType === 'quarter') {
                params.set('quarter', document.getElementById('filterQuarter').value);
                params.set('year',    document.getElementById('filterYear').value);
            } else if (filterType === 'year') {
                params.set('year', document.getElementById('filterYear').value);
            }
        }
        if (status !== 'ALL') params.set('status', status);

        loadInvoices(params);
    }

    function resetFilter() {
        document.getElementById('filterType').value    = 'all';
        document.getElementById('filterStatus').value  = 'ALL';
        document.getElementById('filterKeyword').value = '';
        toggleFilterInputs();
        loadInvoices();
    }

    async function loadInvoices(params) {
        showLoading();
        try {
            const qs  = params ? '?' + params.toString() : '';
            const res = await apiRequest(`${API_BASE_URL}/resident/invoices${qs}`);
            invoices = await res.json();
            renderSummary();
            renderTable();
        } catch(e) {
            showResidentAlert('alertContainer', 'Không thể tải hóa đơn.', 'danger');
        } finally { hideLoading(); }
    }

    function renderSummary() {
        const unpaid  = invoices.filter(i => i.status === 'UNPAID').length;
        const paid    = invoices.filter(i => i.status === 'PAID').length;
        const overdue = invoices.filter(i => i.status === 'OVERDUE').length;
        const totalUnpaidAmt = invoices.filter(i => i.status !== 'PAID')
            .reduce((s, i) => s + parseFloat(i.totalAmt || 0), 0);

        document.getElementById('invoiceSummary').innerHTML = `
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon icon-red"><i class="fas fa-exclamation"></i></div>
                    <div><div class="stat-value">${unpaid}</div><div class="stat-label">Chưa thanh toán</div></div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon icon-green"><i class="fas fa-check"></i></div>
                    <div><div class="stat-value">${paid}</div><div class="stat-label">Đã thanh toán</div></div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon icon-orange"><i class="fas fa-clock"></i></div>
                    <div><div class="stat-value">${overdue}</div><div class="stat-label">Quá hạn</div></div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-icon icon-purple"><i class="fas fa-money-bill"></i></div>
                    <div><div class="stat-value" style="font-size:1.1rem">${formatVND(totalUnpaidAmt)}</div><div class="stat-label">Tổng cần đóng</div></div>
                </div>
            </div>`;
    }

    function renderTable() {
        if (!invoices.length) {
            document.getElementById('invoiceBody').innerHTML =
                `<tr><td colspan="10"><div class="empty-state"><i class="fas fa-file-invoice d-block mb-2"></i><p>Chưa có hóa đơn nào</p></div></td></tr>`;
            return;
        }
        document.getElementById('invoiceBody').innerHTML = invoices.map(inv => {
            const s = INV_STATUS[inv.status] || INV_STATUS.UNPAID;
            return `
            <tr style="cursor:pointer" onclick="openDetail('${inv.id}')">
                <td><strong>Tháng ${inv.month}/${inv.year}</strong></td>
                <td>${inv.electricKwh || 0}</td>
                <td>${inv.waterM3 || 0}</td>
                <td class="text-end">${formatVND(inv.electricAmt)}</td>
                <td class="text-end">${formatVND(inv.waterAmt)}</td>
                <td class="text-end">${formatVND(inv.serviceAmt)}</td>
                <td class="text-end">${formatVND(inv.parkingAmt)}</td>
                <td class="text-end invoice-total">${formatVND(inv.totalAmt)}</td>
                <td class="text-center"><span class="badge ${s.cls}">${s.label}</span></td>
                <td class="text-center">${formatDate(inv.dueDate)}</td>
            </tr>`;
        }).join('');
    }

    function openDetail(id) {
        const inv = invoices.find(i => i.id === id);
        if (!inv) return;
        const s = INV_STATUS[inv.status] || INV_STATUS.UNPAID;

        document.getElementById('invModalTitle').textContent = `Hóa đơn Tháng ${inv.month}/${inv.year}`;

        let bodyHTML = `
            <table class="table table-borderless table-sm">
                <tr><td class="text-muted">Trạng thái</td><td><span class="badge ${s.cls}">${s.label}</span></td></tr>
                <tr><td class="text-muted">Hạn thanh toán</td><td>${formatDate(inv.dueDate)}</td></tr>
                ${inv.paidAt ? `<tr><td class="text-muted">Ngày đã thanh toán</td><td>${formatDateTime(inv.paidAt)}</td></tr>` : ''}
                <tr><td colspan="2"><hr class="my-2"></td></tr>
                <tr><td>Điện (${inv.electricKwh || 0} kWh)</td><td class="text-end">${formatVND(inv.electricAmt)}</td></tr>
                <tr><td>Nước (${inv.waterM3 || 0} m³)</td><td class="text-end">${formatVND(inv.waterAmt)}</td></tr>
                <tr><td>Phí dịch vụ</td><td class="text-end">${formatVND(inv.serviceAmt)}</td></tr>
                <tr><td>Phí gửi xe</td><td class="text-end">${formatVND(inv.parkingAmt)}</td></tr>
                <tr class="fw-bold"><td>TỔNG CỘNG</td><td class="text-end text-danger">${formatVND(inv.totalAmt)}</td></tr>
            </table>`;

        document.getElementById('invModalBody').innerHTML = bodyHTML;

        // Render footer động với nút thanh toán
        let footerHTML = `
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>`;

        if (inv.status === 'UNPAID' || inv.status === 'OVERDUE') {
            footerHTML += `
            <button type="button" class="btn btn-success" onclick="payInvoice('${inv.id}')">
                <i class="fas fa-credit-card"></i> Thanh toán ngay
            </button>`;
        }

        document.getElementById('invModalFooter').innerHTML = footerHTML;

        invModal.show();
    }

    async function payInvoice(invoiceId) {
        if (!confirm('Xác nhận thanh toán hóa đơn này?')) return;

        showLoading();
        try {
            const res = await apiRequest(`${API_BASE_URL}/resident/invoices/${invoiceId}/pay`, {
                method: 'PUT'
            });

            if (res.ok) {
                const message = await res.text();
                showResidentAlert('alertContainer', message, 'success');

                invModal.hide();
                loadInvoices();
            } else {
                const error = await res.text();
                showResidentAlert('alertContainer', 'Lỗi: ' + error, 'danger');
            }
        } catch (error) {
            showResidentAlert('alertContainer', 'Có lỗi xảy ra: ' + error.message, 'danger');
        } finally {
            hideLoading();
        }
    }

    loadInvoices();
    function exportInvoicesToPDF() {
        if (!invoices.length) {
            showResidentAlert('alertContainer', 'Không có hóa đơn để xuất!', 'warning');
            return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const userInfo = getUserInfo();

        // Header
        doc.setFontSize(18);
        doc.text('DANH SÁCH HÓA ĐƠN', 105, 20, { align: 'center' });
        doc.setFontSize(12);
        doc.text(`Cư dân: ${userInfo.fullName}`, 20, 30);
        doc.text(`Ngày xuất: ${new Date().toLocaleDateString('vi-VN')}`, 20, 37);

        // Table
        let y = 50;
        invoices.forEach((inv, idx) => {
            if (y > 270) { doc.addPage(); y = 20; }

            doc.setFontSize(11);
            doc.setFont(undefined, 'bold');
            doc.text(`${idx+1}. Tháng ${inv.month}/${inv.year}`, 20, y);
            doc.setFont(undefined, 'normal');
            doc.setFontSize(10);
            y += 7;

            doc.text(`Điện: ${inv.electricKwh} kWh × 2,500đ = ${formatVND(inv.electricAmt)}`, 25, y);
            y += 6;
            doc.text(`Nước: ${inv.waterM3} m³ × 15,000đ = ${formatVND(inv.waterAmt)}`, 25, y);
            y += 6;
            doc.text(`Phí dịch vụ: ${formatVND(inv.serviceAmt)}`, 25, y);
            y += 6;
            doc.text(`Phí gửi xe: ${formatVND(inv.parkingAmt)}`, 25, y);
            y += 6;

            doc.setFont(undefined, 'bold');
            doc.text(`TỔNG: ${formatVND(inv.totalAmt)}`, 25, y);
            doc.setFont(undefined, 'normal');

            const s = INV_STATUS[inv.status] || INV_STATUS.UNPAID;
            doc.text(`Trạng thái: ${s.label}`, 120, y);
            y += 10;
        });

        doc.save(`hoa-don-${new Date().getTime()}.pdf`);
    }
</script>

<!-- jsPDF CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
