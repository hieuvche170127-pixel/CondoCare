<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yêu cầu hỗ trợ - Cư dân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/resident.css">
</head>
<body>
<div id="loading" class="loading">
    <div class="spinner"></div>
</div>

<div class="resident-wrapper">
    <nav class="resident-sidebar" id="residentSidebar"></nav>
    <button class="mobile-toggle" id="mobileToggle"><i class="fas fa-bars"></i></button>

    <main class="resident-main">
        <div class="page-header">
            <div>
                <h4><i class="fas fa-tools"></i> Yêu cầu hỗ trợ</h4>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="/resident">Trang chủ</a></li>
                        <li class="breadcrumb-item active">Yêu cầu hỗ trợ</li>
                    </ol>
                </nav>
            </div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newRequestModal">
                <i class="fas fa-plus"></i> Tạo yêu cầu mới
            </button>
        </div>

        <div id="alertContainer"></div>

        <!-- ── Filter Bar ─────────────────────────────────── -->
        <div class="content-card mb-3">
            <div class="d-flex flex-wrap gap-2 align-items-end">
                <!-- Tìm kiếm -->
                <div>
                    <label class="form-label small mb-1 fw-semibold">🔍 Tìm kiếm</label>
                    <input type="text" id="filterKeyword" class="form-control form-control-sm"
                           placeholder="Tiêu đề, mô tả..." style="width:200px"
                           onkeydown="if(event.key==='Enter') applyFilter()">
                </div>
                <!-- Loại filter -->
                <div>
                    <label class="form-label small mb-1 fw-semibold">📅 Lọc theo</label>
                    <select id="filterType" class="form-select form-select-sm" style="width:130px"
                            onchange="toggleFilterInputs()">
                        <option value="all">Tất cả</option>
                        <option value="month">Tháng</option>
                        <option value="quarter">Quý</option>
                        <option value="year">Năm</option>
                    </select>
                </div>
                <!-- Tháng -->
                <div id="monthGroup" style="display:none">
                    <label class="form-label small mb-1 fw-semibold">Tháng</label>
                    <select id="filterMonth" class="form-select form-select-sm" style="width:110px">
                        <option value="1">Tháng 1</option><option value="2">Tháng 2</option>
                        <option value="3">Tháng 3</option><option value="4">Tháng 4</option>
                        <option value="5">Tháng 5</option><option value="6">Tháng 6</option>
                        <option value="7">Tháng 7</option><option value="8">Tháng 8</option>
                        <option value="9">Tháng 9</option><option value="10">Tháng 10</option>
                        <option value="11">Tháng 11</option><option value="12">Tháng 12</option>
                    </select>
                </div>
                <!-- Quý -->
                <div id="quarterGroup" style="display:none">
                    <label class="form-label small mb-1 fw-semibold">Quý</label>
                    <select id="filterQuarter" class="form-select form-select-sm" style="width:150px">
                        <option value="1">Quý 1 (T1–T3)</option>
                        <option value="2">Quý 2 (T4–T6)</option>
                        <option value="3">Quý 3 (T7–T9)</option>
                        <option value="4">Quý 4 (T10–T12)</option>
                    </select>
                </div>
                <!-- Năm -->
                <div id="yearGroup" style="display:none">
                    <label class="form-label small mb-1 fw-semibold">Năm</label>
                    <select id="filterYear" class="form-select form-select-sm" style="width:100px">
                        <option value="2023">2023</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                    </select>
                </div>
                <!-- Trạng thái -->
                <div>
                    <label class="form-label small mb-1 fw-semibold">Trạng thái</label>
                    <select id="filterStatus" class="form-select form-select-sm" style="width:150px">
                        <option value="ALL">Tất cả</option>
                        <option value="PENDING">⏳ Chờ xử lý</option>
                        <option value="IN_PROGRESS">🔧 Đang xử lý</option>
                        <option value="DONE">✅ Hoàn thành</option>
                        <option value="REJECTED">❌ Từ chối</option>
                    </select>
                </div>
                <!-- Nút -->
                <div class="d-flex gap-2 mt-3">
                    <button class="btn btn-primary btn-sm" onclick="applyFilter()">
                        <i class="fas fa-filter me-1"></i>Lọc
                    </button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="resetFilter()">
                        <i class="fas fa-redo me-1"></i>Đặt lại
                    </button>
                </div>
            </div>
        </div>
        <div class="content-card">
            <div class="card-title"><i class="fas fa-list me-2"></i>Lịch sử yêu cầu của tôi</div>
            <div id="requestList">
                <div class="empty-state"><i class="fas fa-spinner fa-spin d-block"></i>
                    <p>Đang tải...</p></div>
            </div>
        </div>
    </main>
</div>

<!-- Modal tạo yêu cầu mới -->
<div class="modal fade" id="newRequestModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="fas fa-tools me-2"></i>Tạo yêu cầu hỗ trợ mới</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="formAlert"></div>
                <form id="requestForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tiêu đề *</label>
                        <input type="text" class="form-control" id="reqTitle"
                               placeholder="Mô tả ngắn gọn vấn đề, ví dụ: Bóng đèn hành lang hỏng" maxlength="255">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Danh mục *</label>
                            <select class="form-select" id="reqCategory">
                                <option value="ELECTRIC">⚡ Điện</option>
                                <option value="WATER">💧 Nước</option>
                                <option value="INTERNET">🌐 Internet</option>
                                <option value="HVAC">❄️ Điều hòa / Thông gió</option>
                                <option value="STRUCTURE">🏗️ Kết cấu tòa nhà</option>
                                <option value="OTHER" selected>🔧 Khác</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Mức độ ưu tiên</label>
                            <select class="form-select" id="reqPriority">
                                <option value="LOW">🟢 Thấp - Không gấp</option>
                                <option value="MEDIUM" selected>🟡 Trung bình</option>
                                <option value="HIGH">🔴 Cao - Cần xử lý sớm</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mô tả chi tiết *</label>
                        <textarea class="form-control" id="reqDescription" rows="5"
                                  placeholder="Mô tả chi tiết vấn đề: xảy ra khi nào, ảnh hưởng như thế nào, đã thử khắc phục chưa..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button class="btn btn-primary" id="btnSubmitRequest">
                    <i class="fas fa-paper-plane me-1"></i> Gửi yêu cầu
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="/css/style.css">
<script src="/js/common.js"></script>
<script src="/js/resident-common.js"></script>
<script>
    requireResidentLogin();
    renderResidentSidebar('requests');
    document.getElementById('mobileToggle').addEventListener('click', () =>
        document.getElementById('residentSidebar').classList.toggle('open'));

    const newModal = new bootstrap.Modal(document.getElementById('newRequestModal'));

    // Khởi tạo tháng hiện tại
    document.getElementById('filterMonth').value = String(new Date().getMonth() + 1);

    // ── Toggle filter inputs ────────────────────────────────────
    function toggleFilterInputs() {
        const type = document.getElementById('filterType').value;
        document.getElementById('monthGroup').style.display   = type === 'month'   ? '' : 'none';
        document.getElementById('quarterGroup').style.display = type === 'quarter' ? '' : 'none';
        document.getElementById('yearGroup').style.display    = type !== 'all'     ? '' : 'none';
    }

    // ── Apply filter ────────────────────────────────────────────
    function applyFilter() {
        const params = new URLSearchParams();
        const filterType = document.getElementById('filterType').value;
        const keyword    = document.getElementById('filterKeyword').value.trim();
        const status     = document.getElementById('filterStatus').value;

        if (keyword) {
            params.set('keyword', keyword);
        } else {
            params.set('filterType', filterType);
            if (filterType === 'month') {
                params.set('month', document.getElementById('filterMonth').value);
                params.set('year',  document.getElementById('filterYear').value);
            } else if (filterType === 'quarter') {
                params.set('quarter', document.getElementById('filterQuarter').value);
                params.set('year',    document.getElementById('filterYear').value);
            } else if (filterType === 'year') {
                params.set('year', document.getElementById('filterYear').value);
            }
        }
        if (status !== 'ALL') params.set('status', status);

        loadRequests(params);
    }

    function resetFilter() {
        document.getElementById('filterType').value    = 'all';
        document.getElementById('filterStatus').value  = 'ALL';
        document.getElementById('filterKeyword').value = '';
        toggleFilterInputs();
        loadRequests();
    }

    // ── Load danh sách ────────────────────────────────────────
    async function loadRequests(params) {
        showLoading();
        try {
            const qs  = params ? '?' + params.toString() : '';
            const res  = await apiRequest(`${API_BASE_URL}/resident/requests${qs}`);
            const data = await res.json();
            renderRequests(data);
        } catch(e) {
            showResidentAlert('alertContainer', 'Không thể tải danh sách yêu cầu.');
        } finally { hideLoading(); }
    }

    function renderRequests(list) {
        if (!list.length) {
            document.getElementById('requestList').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-check-circle d-block mb-2"></i>
                    <h6>Chưa có yêu cầu nào</h6>
                    <p>Nhấn <strong>"Tạo yêu cầu mới"</strong> để gửi yêu cầu hỗ trợ tới Ban quản lý.</p>
                </div>`;
            return;
        }

        document.getElementById('requestList').innerHTML = list.map(sr => {
            const s  = SR_STATUS[sr.status]   || SR_STATUS.PENDING;
            const c  = SR_CATEGORY[sr.category] || SR_CATEGORY.OTHER;
            const pColor = { LOW:'success', MEDIUM:'warning', HIGH:'danger' }[sr.priority] || 'secondary';
            return `
            <div class="request-card">
                <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                    <div>
                        <span class="badge bg-light text-dark border me-1">
                            <i class="fas ${c.icon} me-1"></i>${c.label}
                        </span>
                        <span class="badge bg-${pColor} me-1">
                            ${sr.priority === 'HIGH' ? '🔴' : sr.priority === 'MEDIUM' ? '🟡' : '🟢'} ${sr.priority}
                        </span>
                        <span class="request-title">${sr.title}</span>
                    </div>
                    <span class="badge ${s.cls}">${s.label}</span>
                </div>
                <p class="text-muted small mt-2 mb-2">${sr.description.substring(0,150)}${sr.description.length>150?'...':''}</p>
                ${sr.note ? `
                <div class="alert alert-info py-2 px-3 mb-2 small">
                    <i class="fas fa-comment-alt me-1"></i><strong>Phản hồi từ Ban quản lý:</strong> ${sr.note}
                </div>` : ''}
                <div class="request-meta d-flex gap-3 flex-wrap">
                    <span><i class="fas fa-calendar me-1"></i>${formatDate(sr.createdAt)}</span>
                    ${sr.assignedTo ? `<span><i class="fas fa-user-cog me-1"></i>Phụ trách: ${sr.assignedTo}</span>` : ''}
                    ${sr.updatedAt  ? `<span><i class="fas fa-sync me-1"></i>Cập nhật: ${formatDate(sr.updatedAt)}</span>`  : ''}
                </div>
            </div>`;
        }).join('');
    }

    // ── Submit yêu cầu mới ──────────────────────────────────────
    document.getElementById('btnSubmitRequest').addEventListener('click', async function(e) {
        e.preventDefault();

        const title       = document.getElementById('reqTitle').value.trim();
        const description = document.getElementById('reqDescription').value.trim();
        const category    = document.getElementById('reqCategory').value;
        const priority    = document.getElementById('reqPriority').value;

        if (!title || !description) {
            document.getElementById('formAlert').innerHTML = `
                <div class="alert alert-warning">Vui lòng điền đầy đủ Tiêu đề và Mô tả!</div>`;
            return;
        }

        document.getElementById('formAlert').innerHTML = '';
        this.disabled = true;
        this.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Đang gửi...';

        showLoading();
        try {
            const response = await apiRequest(`${API_BASE_URL}/resident/requests`, {
                method: 'POST',
                body: JSON.stringify({ title, description, category, priority })
            });

            if (response.ok) {
                const message = await response.text();
                showResidentAlert('alertContainer', message, 'success');
                newModal.hide();
                document.getElementById('requestForm').reset();
                loadRequests(); // Reload list
            } else {
                const error = await response.text();
                document.getElementById('formAlert').innerHTML =
                    `<div class="alert alert-danger">Lỗi: ${error}</div>`;
            }
        } catch (error) {
            document.getElementById('formAlert').innerHTML =
                `<div class="alert alert-danger">Có lỗi xảy ra: ${error.message}</div>`;
        } finally {
            hideLoading();
            this.disabled = false;
            this.innerHTML = '<i class="fas fa-paper-plane me-1"></i> Gửi yêu cầu';
        }
    });

    loadRequests();
</script>
</body>
</html>
