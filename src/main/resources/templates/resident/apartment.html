<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin căn hộ - Cư dân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/resident.css">

</head>
<body>
<div id="loading" class="loading"><div class="spinner"></div></div>

<div class="resident-wrapper">
    <nav class="resident-sidebar" id="residentSidebar"></nav>
    <button class="mobile-toggle" id="mobileToggle"><i class="fas fa-bars"></i></button>

    <main class="resident-main">
        <div class="page-header">
            <div>
                <h4><i class="fas fa-building"></i> Thông tin căn hộ</h4>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="/resident">Trang chủ</a></li>
                        <li class="breadcrumb-item active">Thông tin căn hộ</li>
                    </ol>
                </nav>
            </div>
        </div>

        <div id="alertContainer"></div>
        <div id="aptContent"></div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/common.js"></script>
<script src="/js/resident-common.js"></script>
<script>
    requireResidentLogin();
    renderResidentSidebar('apartment');
    document.getElementById('mobileToggle').addEventListener('click', () =>
        document.getElementById('residentSidebar').classList.toggle('open'));

    const STATUS_LABEL = { EMPTY:'Trống', OCCUPIED:'Đang ở', MAINTENANCE:'Đang bảo trì' };
    const RENTAL_LABEL = { AVAILABLE:'Có thể thuê', RENTED:'Đang cho thuê', OWNER:'Chủ sở hữu' };
    const TYPE_LABEL   = { OWNER:'Chủ sở hữu', TENANT:'Người thuê', GUEST:'Khách' };

    async function loadApartment() {
        showLoading();
        try {
            const res  = await apiRequest(`${API_BASE_URL}/resident/apartment`);
            const data = await res.json();

            if (!data.hasApartment) {
                document.getElementById('aptContent').innerHTML = `
                    <div class="content-card">
                        <div class="empty-state">
                            <i class="fas fa-building d-block mb-3"></i>
                            <h5>Chưa được gán căn hộ</h5>
                            <p>Vui lòng liên hệ Ban quản lý để được hỗ trợ.</p>
                        </div>
                    </div>`;
                return;
            }

            document.getElementById('aptContent').innerHTML = `
            <div class="row g-3">
                <!-- Thông tin căn hộ -->
                <div class="col-md-6">
                    <div class="content-card h-100">
                        <div class="card-title"><i class="fas fa-home me-2"></i>Căn hộ ${data.number}</div>

                        <div class="apt-info-row">
                            <span class="label"><i class="fas fa-hashtag me-2"></i>Số căn hộ</span>
                            <span class="value">${data.number}</span>
                        </div>
                        <div class="apt-info-row">
                            <span class="label"><i class="fas fa-layer-group me-2"></i>Tầng</span>
                            <span class="value">${data.floor}</span>
                        </div>
                        <div class="apt-info-row">
                            <span class="label"><i class="fas fa-ruler-combined me-2"></i>Diện tích</span>
                            <span class="value">${data.area} m²</span>
                        </div>
                        <div class="apt-info-row">
                            <span class="label"><i class="fas fa-toggle-on me-2"></i>Trạng thái</span>
                            <span class="value">
                                <span class="badge ${data.status==='OCCUPIED'?'bg-success':data.status==='MAINTENANCE'?'bg-warning text-dark':'bg-secondary'}">
                                    ${STATUS_LABEL[data.status] || data.status}
                                </span>
                            </span>
                        </div>
                        <div class="apt-info-row">
                            <span class="label"><i class="fas fa-users me-2"></i>Số cư dân</span>
                            <span class="value">${data.totalResident || 0} người</span>
                        </div>
                        ${data.description ? `
                        <div class="apt-info-row flex-column">
                            <span class="label mb-1"><i class="fas fa-info-circle me-2"></i>Mô tả</span>
                            <span class="value">${data.description}</span>
                        </div>` : ''}
                    </div>
                </div>

                <!-- Thông tin tòa nhà -->
                <div class="col-md-6">
                    <div class="content-card h-100">
                        <div class="card-title"><i class="fas fa-city me-2"></i>Tòa nhà</div>

                        <div class="apt-info-row">
                            <span class="label"><i class="fas fa-building me-2"></i>Tên tòa</span>
                            <span class="value">${data.buildingName || '—'}</span>
                        </div>
                        <div class="apt-info-row">
                            <span class="label"><i class="fas fa-map-marker-alt me-2"></i>Địa chỉ</span>
                            <span class="value">${data.buildingAddress || '—'}</span>
                        </div>
                        <div class="apt-info-row">
                            <span class="label"><i class="fas fa-sort-amount-up me-2"></i>Tổng số tầng</span>
                            <span class="value">${data.totalFloors || '—'}</span>
                        </div>
                        <div class="apt-info-row">
                            <span class="label"><i class="fas fa-user me-2"></i>Loại cư trú</span>
                            <span class="value">
                                <span class="badge bg-primary">${TYPE_LABEL[data.residentType] || data.residentType}</span>
                            </span>
                        </div>
                    </div>
                </div>

                <!-- Ghi chú liên hệ -->
                <div class="col-12">
                    <div class="content-card">
                        <div class="card-title"><i class="fas fa-phone-alt me-2"></i>Liên hệ Ban quản lý</div>
                        <p class="mb-1">Nếu cần hỗ trợ hoặc có vấn đề về căn hộ, vui lòng:</p>
                        <ul class="mb-0">
                            <li>Đến trực tiếp văn phòng Ban quản lý tại <strong>Tầng 1, Tòa A</strong></li>
                            <li>Gửi <a href="/resident/requests">Yêu cầu hỗ trợ</a> qua hệ thống</li>
                            <li>Hotline: <strong>0900 000 000</strong> (8h–17h, T2–T6)</li>
                        </ul>
                    </div>
                </div>
            </div>`;

        } catch(e) {
            showResidentAlert('alertContainer', 'Không thể tải thông tin căn hộ.');
        } finally { hideLoading(); }
    }

    loadApartment();
</script>
</body>
</html>
