<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Thẻ Ra Vào - CondoCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse bg-dark" style="min-height: 100vh;">
            <div class="position-sticky pt-3">
                <div class="text-center mb-4"><h4 class="text-white">Dashboard</h4></div>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link active text-warning fw-bold" href="/dashboard/access-cards"><i class="fas fa-id-card"></i> Thẻ ra vào</a></li>
                </ul>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4">
            <div class="card shadow-sm col-lg-8 mx-auto border-0">
                <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                    <h5 class="m-0 fw-bold text-primary"><i class="fas fa-address-card me-2"></i>Chi Tiết Thẻ Ra Vào</h5>
                    <span th:if="${accessCard.status.name() == 'ACTIVE'}" class="badge bg-success fs-6">Đang hoạt động</span>
                    <span th:if="${accessCard.status.name() == 'BLOCKED'}" class="badge bg-danger fs-6">Đã bị khóa</span>
                    <span th:if="${accessCard.status.name() == 'LOST'}" class="badge bg-secondary fs-6">Đã báo mất</span>
                </div>

                <div class="card-body p-4">
                    <div class="row mb-4">
                        <div class="col-sm-4 text-muted fw-bold">Mã hệ thống (ID):</div>
                        <div class="col-sm-8" th:text="${accessCard.id}"></div>
                    </div>
                    <div class="row mb-4">
                        <div class="col-sm-4 text-muted fw-bold">Mã thẻ vật lý:</div>
                        <div class="col-sm-8 text-primary fw-bold fs-5" th:text="${accessCard.cardNumber}"></div>
                    </div>
                    <hr>
                    <div class="row mb-4">
                        <div class="col-sm-4 text-muted fw-bold">Chủ sở hữu (Cư dân):</div>
                        <div class="col-sm-8 fw-bold" th:text="${accessCard.resident != null ? accessCard.resident.fullName : 'Không có dữ liệu'}"></div>
                    </div>
                    <div class="row mb-4">
                        <div class="col-sm-4 text-muted fw-bold">Nhân viên cấp phát:</div>
                        <div class="col-sm-8" th:text="${accessCard.issuedBy != null ? accessCard.issuedBy.fullName : 'Hệ thống'}"></div>
                    </div>
                    <hr>
                    <div class="row mb-4">
                        <div class="col-sm-4 text-muted fw-bold">Ngày giờ cấp:</div>
                        <div class="col-sm-8" th:text="${#temporals.format(accessCard.issuedAt, 'dd/MM/yyyy HH:mm:ss')}"></div>
                    </div>
                    <div class="row mb-4">
                        <div class="col-sm-4 text-muted fw-bold">Ngày hết hạn:</div>
                        <div class="col-sm-8 text-danger" th:text="${accessCard.expiredAt != null ? #temporals.format(accessCard.expiredAt, 'dd/MM/yyyy HH:mm:ss') : 'Vô thời hạn'}"></div>
                    </div>
                </div>

                <div class="card-footer bg-light text-end py-3">
                    <a th:href="@{/dashboard/access-cards}" class="btn btn-outline-secondary me-2"><i class="fas fa-arrow-left"></i> Trở về</a>
                    <a th:href="@{/dashboard/access-cards/edit/{id}(id=${accessCard.id})}" class="btn btn-primary"><i class="fas fa-edit"></i> Chỉnh sửa</a>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
