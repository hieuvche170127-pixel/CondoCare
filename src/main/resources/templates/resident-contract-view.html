<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết Hợp đồng - Cư Dân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .detail-label { color: #6c757d; font-weight: 600; font-size: 0.9rem; margin-bottom: 5px; }
        .detail-value { font-size: 1.15rem; color: #212529; font-weight: 500; margin-bottom: 1.5rem; border-bottom: 1px solid #e9ecef; padding-bottom: 8px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">Resident Portal</a>
        <ul class="navbar-nav ms-auto"><li class="nav-item"><a class="nav-link" href="/resident-dashboard/contracts">Quay lại danh sách</a></li></ul>
    </div>
</nav>

<div class="container py-4">
    <div class="card shadow-lg border-0 mb-5" th:style="${contract.status?.name() == 'PENDING' ? 'border: 2px solid #ffc107 !important;' : ''}">
        <div class="card-header bg-white py-4 text-center border-bottom">
            <h3 class="fw-bold mb-2">HỢP ĐỒNG <span th:text="${contract.type?.name() == 'RENT' ? 'CHO THUÊ' : 'MUA BÁN'}"></span></h3>
            <p class="text-muted mb-0">Mã Số: <strong th:text="${contract.id}"></strong></p>
        </div>

        <div class="card-body p-5">
            <div class="row">
                <div class="col-md-6 pe-md-5">
                    <h5 class="text-secondary mb-4">THÔNG TIN BÊN CHO THUÊ/BÁN (BÊN A)</h5>
                    <div class="detail-label">Đại diện Ban Quản Lý</div>
                    <div class="detail-value fw-bold">Hệ thống CondoCare</div>
                    <div class="detail-label mt-4">TÀI SẢN GIAO DỊCH</div>
                    <div class="detail-value fw-bold text-primary fs-4" th:text="'Căn hộ số: ' + (${contract.apartment?.id != null ? contract.apartment.id : 'N/A'})"></div>
                </div>

                <div class="col-md-6 ps-md-5 border-start">
                    <h5 class="text-secondary mb-4">THÔNG TIN CƯ DÂN (BÊN B)</h5>
                    <div class="detail-label">Họ và Tên</div>
                    <div class="detail-value fw-bold" th:text="${contract.resident?.fullName != null ? contract.resident.fullName : 'N/A'}"></div>

                    <h5 class="text-secondary mt-5 mb-4">TÀI CHÍNH & THỜI HẠN</h5>
                    <div class="detail-label">Tổng giá trị thanh toán</div>
                    <div class="detail-value text-danger fs-3 fw-bold" th:text="${contract.totalValue != null ? #numbers.formatDecimal(contract.totalValue, 0, 'COMMA', 0, 'POINT') + ' VNĐ' : 'N/A'}"></div>
                </div>
            </div>
        </div>

        <div class="card-footer bg-light py-4 d-flex justify-content-center gap-3" th:if="${contract.status?.name() == 'PENDING'}">
            <form th:action="@{/resident-dashboard/contracts/respond}" method="POST" class="m-0">
                <input type="hidden" name="contractId" th:value="${contract.id}">
                <input type="hidden" name="action" value="REJECT">
                <button type="submit" class="btn btn-outline-danger btn-lg px-5">Từ chối ký</button>
            </form>
            <form th:action="@{/resident-dashboard/contracts/respond}" method="POST" class="m-0">
                <input type="hidden" name="contractId" th:value="${contract.id}">
                <input type="hidden" name="action" value="CONFIRM">
                <button type="submit" class="btn btn-success btn-lg px-5">Xác nhận & Ký kết</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
