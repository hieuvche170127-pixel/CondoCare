<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh sách Thẻ Ra Vào - CondoCare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse bg-dark" style="min-height: 100vh;">
      <div class="position-sticky pt-3">
        <div class="text-center mb-4"><h4 class="text-white"><i class="fas fa-building"></i> Dashboard</h4></div>
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link text-white" href="/dashboard/buildings"><i class="fas fa-building"></i> Tòa nhà</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="/dashboard/apartments"><i class="fas fa-home"></i> Căn hộ</a></li>
          <li class="nav-item"><a class="nav-link active text-warning fw-bold" href="/dashboard/access-cards"><i class="fas fa-id-card"></i> Thẻ ra vào</a></li>
        </ul>
      </div>
    </nav>

    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
      <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Quản lý Thẻ Ra Vào</h1>
        <a th:href="@{/dashboard/access-cards/add}" class="btn btn-primary shadow-sm">
          <i class="fas fa-plus"></i> Cấp thẻ mới
        </a>
      </div>

      <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-1"></i> <strong th:text="${successMessage}"></strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <div class="card shadow-sm mb-4 border-0">
        <div class="card-body">
          <form th:action="@{/dashboard/access-cards}" method="GET" class="row g-3 align-items-end">
            <div class="col-md-3">
              <label class="form-label fw-bold">Tìm theo Chủ Thẻ</label>
              <input type="text" name="keyword" class="form-control" placeholder="Nhập tên cư dân..." th:value="${keyword}">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold">Tòa nhà</label>
              <select name="buildingId" class="form-select">
                <option value="">-- Tất cả tòa nhà --</option>
                <option th:each="b : ${buildings}" th:value="${b.id}" th:text="${b.name}" th:selected="${buildingId == b.id}"></option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold">Trạng thái thẻ</label>
              <select name="status" class="form-select">
                <option value="">-- Tất cả trạng thái --</option>
                <option value="ACTIVE" th:selected="${status != null and status.name() == 'ACTIVE'}">Hoạt động</option>
                <option value="BLOCKED" th:selected="${status != null and status.name() == 'BLOCKED'}">Bị khóa</option>
                <option value="LOST" th:selected="${status != null and status.name() == 'LOST'}">Đã mất</option>
              </select>
            </div>
            <div class="col-md-3">
              <button type="submit" class="btn btn-secondary w-100"><i class="fas fa-search"></i> Tìm kiếm & Lọc</button>
            </div>
          </form>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
              <thead class="table-light text-center">
              <tr>
                <th>Mã Thẻ</th>
                <th>Chủ Thẻ</th>
                <th>Căn hộ - Tòa nhà</th>
                <th>Ngày Cấp</th>
                <th>Trạng Thái</th>
                <th>Thao Tác</th>
              </tr>
              </thead>
              <tbody>
              <tr th:if="${#lists.isEmpty(accessCards)}">
                <td colspan="6" class="text-center text-muted py-4">Không tìm thấy thẻ nào phù hợp.</td>
              </tr>
              <tr th:each="card : ${accessCards}">
                <td class="text-center text-primary fw-bold" th:text="${card.cardNumber}"></td>

                <td class="fw-bold" th:text="${card.resident != null ? card.resident.fullName : 'N/A'}"></td>

                <td class="text-center text-muted">
                                        <span th:if="${card.resident != null and card.resident.apartment != null}">
                                            Phòng <span th:text="${card.resident.apartment.number}"></span> -
                                            <span th:text="${card.resident.apartment.building.name}"></span>
                                        </span>
                  <span th:unless="${card.resident != null and card.resident.apartment != null}">N/A</span>
                </td>

                <td class="text-center" th:text="${#temporals.format(card.issuedAt, 'dd/MM/yyyy')}"></td>
                <td class="text-center">
                  <span th:if="${card.status.name() == 'ACTIVE'}" class="badge bg-success">Hoạt động</span>
                  <span th:if="${card.status.name() == 'BLOCKED'}" class="badge bg-danger">Đã Khóa</span>
                  <span th:if="${card.status.name() == 'LOST'}" class="badge bg-secondary">Đã mất</span>
                </td>
                <td class="text-center">
                  <a th:href="@{/dashboard/access-cards/view/{id}(id=${card.id})}" class="btn btn-sm btn-info text-white"><i class="fas fa-eye"></i></a>
                  <a th:href="@{/dashboard/access-cards/edit/{id}(id=${card.id})}" class="btn btn-sm btn-primary"><i class="fas fa-edit"></i></a>
                  <a th:if="${card.status.name() != 'BLOCKED'}"
                     th:href="@{/dashboard/access-cards/lock/{id}(id=${card.id})}"
                     class="btn btn-sm btn-warning"
                     onclick="return confirm('Khóa thẻ này?');">
                    <i class="fas fa-lock"></i>
                  </a>
                </td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="card-footer bg-white d-flex justify-content-between align-items-center" th:if="${totalPages > 0}">
          <span class="text-muted">Tổng: <strong th:text="${totalItems}"></strong> thẻ (Trang <span th:text="${currentPage}"></span>/<span th:text="${totalPages}"></span>)</span>
          <nav>
            <ul class="pagination pagination-sm mb-0">
              <li class="page-item" th:classappend="${currentPage == 1 ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/dashboard/access-cards(pageNo=${currentPage - 1}, keyword=${keyword}, buildingId=${buildingId}, status=${status})}">Trước</a>
              </li>

              <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i ? 'active' : ''}">
                <a class="page-link" th:href="@{/dashboard/access-cards(pageNo=${i}, keyword=${keyword}, buildingId=${buildingId}, status=${status})}" th:text="${i}"></a>
              </li>

              <li class="page-item" th:classappend="${currentPage == totalPages ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/dashboard/access-cards(pageNo=${currentPage + 1}, keyword=${keyword}, buildingId=${buildingId}, status=${status})}">Sau</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
